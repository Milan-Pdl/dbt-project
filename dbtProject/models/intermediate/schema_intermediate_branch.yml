version: 2

models:
  - name: intermediate_branch
    description: >
      Intermediate branch master table. Mirrors `stg_branch` with intermediate metadata.
    columns:
      - name: branch_id
        description: "Primary key. Unique branch identifier."
        tests:
          - unique
          - not_null

      - name: province
        description: "Branch province."

      - name: cluster_name
        description: "Branch cluster name."

      - name: city_name
        description: "Branch city name."

      - name: branch_name
        description: "Branch name."

      - name: created_date
        description: "Record creation timestamp."
        tests:
          - not_null

      - name: modified_date
        description: "Record last modified timestamp."
        tests:
          - not_null
