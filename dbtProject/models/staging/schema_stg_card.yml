version: 2

models:
  - name: stg_card
    description: >
      Card table. One row per card linked to a bank account, with balance and expiry details.
    columns:
      - name: card_number
        description: "Primary key. Unique card number."
        tests:
          - unique
          - not_null
      - name: account_id
        description: "Account foreign key reference."
        tests:
          - not_null
      - name: balance
        description: "Current card balance."
        tests:
          - not_null
      - name: card_type
        description: "Card type, such as DEBIT or CREDIT."
        tests:
          - not_null
      - name: closing_balance
        description: "Closing balance on the card."
      - name: card_expiry_date
        description: "Card expiry date."
      - name: created_date
        description: "Record creation timestamp."
        tests:
          - not_null
      - name: modified_date
        description: "Record last modified timestamp."
        tests:
          - not_null
